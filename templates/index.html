<!DOCTYPE html>
<html>
<head>
    <title>URL Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🔍 URL Analyzer</h1>

<form method="POST">
    <input type="text" name="url" placeholder="Enter URL" required>
    <button type="submit">Analyze</button>
</form>

{% if result %}
<div class="box">
    <p><b>URL:</b> {{ result.url }}</p>
    <p><b>Domain:</b> {{ result.domain }}</p>
    <p><b>Domain Age:</b> {{ result.age }} days</p>

    {% if result.vt.status == "SAFE" %}
        <p class="safe">🟢 SAFE</p>
    {% elif result.vt.status == "MALICIOUS" %}
        <p class="danger">🔴 MALICIOUS</p>
    {% else %}
        <p class="error">⚠ ERROR</p>
    {% endif %}

</div>
{% endif %}

</body>
</html>
